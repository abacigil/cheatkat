# sample kitty.conf used by parser tests
kitty_mod ctrl+alt

# remap copy + clear the default
map ctrl+shift+c no_op
map ctrl+alt+c copy_to_clipboard

# custom binding
map ctrl+alt+r launch --type=tab nvim ~/notes.md

# line continuation
map ctrl+alt+m \
  send_text all hello world

# kitty_mod substitution
map kitty_mod+t new_tab
